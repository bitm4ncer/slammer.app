name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Single concurrent deployment — newer pushes cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # GitHub Pages skips files starting with `_` unless .nojekyll is present.
      # Vite emits chunks under `assets/` so this guard isn't strictly required,
      # but it future-proofs us against any underscore-prefixed assets.
      - name: Disable Jekyll
        run: touch dist/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
