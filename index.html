<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>slammer.app</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
  <div id="app">
    <header class="app-toolbar">
      <div class="toolbar-left">
        <div class="slammer-mini-logo">slammer.app</div>
        <span class="version-tag">v1.0.0-alpha</span>
      </div>
      <div class="toolbar-right">
        <button class="tb-btn tb-btn--icon" id="btnNew" title="New Blank (Ctrl+N)"><i class="fas fa-file"></i></button>
        <button class="tb-btn tb-btn--icon" id="btnOpen" title="Open Project (Ctrl+O)"><i class="fas fa-folder-open"></i></button>
        <button class="tb-btn tb-btn--icon" id="btnSave" title="Save Project (Ctrl+S)"><i class="fas fa-save"></i></button>
        <button class="tb-btn tb-btn--icon" id="btnDocSize" title="Document size / export region"><i class="fas fa-vector-square"></i></button>
        <button class="tb-btn tb-btn--icon" id="btnExport" title="Export PNG (Ctrl+E) · Shift = .slammerproj"><i class="fas fa-file-export"></i></button>
      </div>
    </header>

    <aside class="tool-sidebar">
      <button class="tool-btn" id="btnAddImage" title="Add Image Layer (I)" data-shortcut="I"><i class="fas fa-image"></i></button>
      <button class="tool-btn" id="btnAddText" title="Add Text Layer (T) — Ctrl+Shift+drag a handle to convert to a wrapping text box" data-shortcut="T"><span style="font-family:Inter,sans-serif;font-size:14px;font-weight:700;letter-spacing:-0.02em;">T</span></button>
    </aside>

    <section class="canvas-area">
      <div id="stageContainer"></div>
      <div class="canvas-hint" id="canvasHint">
        <i class="fas fa-layer-group"></i>
        <p>Drop an image or click <strong>Add Image</strong> to start</p>
      </div>
      <div class="zoom-controls">
        <button class="zoom-btn" id="zoomIn"><i class="fas fa-plus"></i></button>
        <button class="zoom-btn" id="zoomOut"><i class="fas fa-minus"></i></button>
        <button class="zoom-btn" id="zoomFit" title="Fit"><i class="fas fa-crosshairs"></i></button>
        <button class="zoom-btn" id="btnFullscreen" title="Toggle fullscreen (F11)"><i class="fas fa-expand"></i></button>
      </div>
    </section>

    <aside class="side-panel plastic-texture">
      <div class="side-panel-top" id="sidePanelTop">
        <div class="control-group layers-group">
          <h3>
            <i class="fas fa-layer-group"></i>
            <span>Layer Stack</span>
            <button class="layers-add-btn" id="btnAddStackItem" title="Add layer or adjustment" aria-label="Add layer"></button>
          </h3>
          <div class="layer-list" id="layerList">
            <div class="layer-empty">No layers yet</div>
          </div>
        </div>
      </div>

      <div class="side-panel-handle" id="sidePanelHandle" role="separator" aria-orientation="horizontal" aria-label="Resize panel" tabindex="0">
        <span class="side-panel-handle-grip"></span>
      </div>

      <div class="side-panel-bottom" id="sidePanelBottom">
        <div class="control-group effects-group" id="effectsGroup">
          <h3>
            <i class="fas fa-sliders-h"></i>
            <span>Effects</span>
            <button class="effects-add-btn" id="btnAddEffect" title="Add effect" aria-label="Add effect"></button>
          </h3>
          <div class="effect-stack" id="effectStack"></div>
        </div>
      </div>
    </aside>

    <footer class="app-footer">
      <div class="footer-left">
        <button class="tb-btn tb-btn--icon" id="btnSettings" title="Settings"><i class="fas fa-gear"></i></button>
        <div class="affinity-mount" id="affinityMount"></div>
        <div class="autosave-indicator" id="autosaveDot" title="Autosave"></div>
      </div>
      <div class="footer-right">
        <div class="alignment-strip" id="alignmentStrip" hidden></div>
        <span class="tb-sep"></span>
        <button class="tb-btn tb-btn--icon tb-undo" title="Undo (Ctrl+Z)" disabled><i class="fas fa-rotate-left"></i></button>
        <button class="tb-btn tb-btn--icon tb-redo" title="Redo (Ctrl+Shift+Z)" disabled><i class="fas fa-rotate-right"></i></button>
      </div>
    </footer>

    <div id="notification" class="notification"></div>
    <div class="slammer-logo-footer">slammer.app</div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
